server:
  port: ${SERVER_PORT:8080}

unimarket:
  search:
    tracking:
      async:
        core-pool-size: 4
        max-pool-size: 8
        queue-capacity: 5000



spring:
  application:
    name: nowl-backend

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://:3306/unimarketnew?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  data:
    redis:
      host: ${REDIS_HOST:192.168}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT:3000ms}
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0
      password: ${REDIS_PASSWORD:123456}

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      write-dates-as-timestamps: false

  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

  ai:
    retry:
      max-attempts: ${SPRING_AI_RETRY_MAX_ATTEMPTS:4}
      on-client-errors: ${SPRING_AI_RETRY_ON_CLIENT_ERRORS:true}
      backoff:
        initial-interval: ${SPRING_AI_RETRY_INITIAL_INTERVAL:1s}
        max-interval: ${SPRING_AI_RETRY_MAX_INTERVAL:4s}
        multiplier: ${SPRING_AI_RETRY_MULTIPLIER:2}
    openai:
      api-key: ${OPENAI_API_KEY:sk-}
      base-url: ${OPENAI_BASE_URL:https://api.moonshot.cn}
      chat:
        options:
          model: ${OPENAI_MODEL:moonshot-v1-128k-vision-preview}
          temperature: ${OPENAI_TEMPERATURE:0.2}

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.unimarket.module.*.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: ${MYBATIS_LOG_IMPL:org.apache.ibatis.logging.nologging.NoLoggingImpl}
    cache-enabled: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: ${JWT_SECRET:dW5pbWFya2V0X3NlY3JldF9rZXlfMjAyNF9zcHJpbmdfYm9vdF92dWUzX2NhbXB1c190cmFkaW5nX3BsYXRmb3JtX2Jhc2U2NA==}
  access-expiration: ${JWT_ACCESS_EXPIRATION:60000000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

cos:
  secret-id: ${COS_SECRET_ID:Umrk}
  secret-key: ${COS_SECRET_KEY:j}
  region: ${COS_REGION:ap-guangzhou}
  bucket-name: ${COS_BUCKET_NAME:}
  base-url: ${COS_BASE_URL:myqcloud.com}

rocketmq:
  name-server: ${ROCKETMQ_NAME_SERVER::9876}
  producer:
    group: ${ROCKETMQ_PRODUCER_GROUP:unimarket-producer-group}
    send-message-timeout: 3000

spring.elasticsearch:
  uris: ${ES_HOST::9200}
  username: ${ES_USERNAME:}
  password: ${ES_PASSWORD:}

xxl:
  job:
    admin:
      addresses: ${XXL_JOB_ADMIN_ADDRESSES:http://:8088/xxl-job-admin}
    accessToken: ${XXL_JOB_ACCESS_TOKEN:default_token}
    executor:
      appname: ${XXL_EXECUTOR_APPNAME:nowl-executor}
      address:
      ip:
      port: ${XXL_EXECUTOR_PORT:9999}
      logpath: ./logs/xxl-job
      logretentiondays: 30

logging:
  level:
    com.unimarket: info
    com.baomidou.mybatisplus: info
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n'

sms:
  spug:
    url: ${SMS_SPUG_URL:}
    enabled: ${SMS_ENABLED:true}

system:
  default-avatar: ${DEFAULT_AVATAR:}
  upload-path: ${UPLOAD_PATH:/home/ubuntu/uploads/}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always


